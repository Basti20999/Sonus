on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-24.04
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'ci skip')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: webrtc-pion/go.mod
          cache: true
          cache-dependency-path: webrtc-pion/go.sum

      - name: Setup latest UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          install-only: true

      - name: Build and publish project
        run: ./gradlew build publish --no-daemon --parallel -PpackGo -PminceraftUsername=${{ secrets.PUBLISH_USERNAME }} -PminceraftPassword=${{ secrets.PUBLISH_PASSWORD }}

      - name: Upload project jars
        uses: actions/upload-artifact@v7
        with:
          name: Sonus-Artifacts
          path: build/libs/sonus-*
          if-no-files-found: error
